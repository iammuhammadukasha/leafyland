services:
  postgres:
    image: postgres:16-alpine
    container_name: leafyland-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: leafyland
      POSTGRES_PASSWORD: leafyland
      POSTGRES_DB: leafyland
    volumes:
      - leafyland_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leafyland -d leafyland']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  leafyland_pg_data:
